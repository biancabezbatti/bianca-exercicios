<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <title>Crie sua Conta do Hello Pizza</title>
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <form>
      <h2>Crie sua Conta</h2>
      <div>
        <fieldset class="style">
          <legend>Conta:</legend>
          <div class="conta">
            <label>Email:</label>
            <input type="email" name="email" minlength="6"  required />
          </div>
          <div class="conta">
            <label>Senha:</label>
            <input type="password" name="senha" required />
          </div>
        </fieldset>
        <fieldset class="style">
          <legend>Pessoal</legend>
          <div class="pessoal">
            <label>Nome:</label>
            <input type="text" name="nome" placeholder="Ex: Bruno" required autocomplete />
          </div>
          <div class="pessoal">
            <label>Telefone:</label>
            <input type="tel" name="telefone" placeholder="Ex: (99) 99999-9999"  maxlength="15" />
          </div>
          <div class="pessoal">
            Sexo:
            <input type="radio" name="sexo" value="masculino" checked>
            <label>Masculino</label>
            <input type="radio" name="sexo" value="feminino">
            <label>Feminino</label>
          </div>
          <div class="pessoal">
            <label>Data de nascimento:</label>
            <input type="date" name="data" required />
          </div>
          <div class="pessoal">
            <label>Foto de perfil:</label>
            <input type="file" accept="image/*" />
          </div>
        </fieldset>
        <fieldset class="style">
            <legend>Endereço:</legend>
            <div class="endereco">
              <label>Rua</label>
              <input type="text" name="endereco_rua" required />
            </div>
            <div class="endereco">
              <label>Numero</label>
              <input type="number" name="endereco_numero" min="1" max="1000" value="0" required />
            </div>
            <div>
              <label>Complemento</label>
              <input type="text" name="endereco_complemento" required />
            </div>
            <div class="endereco">
              <label>Cidade</label>
              <input type="text" name="endereco_cidade" required />
            </div>
            <div>
              <label>Estado</label>
              <select name="endereco_estado">
                <option value="sc">Santa Catarina</option>
                <option value="pr">Paraná</option>
              </select>
            </div>
        </fieldset>
        <fieldset class="style">
          <legend>Anuncio:</legend>
          <div class="endereco">
            <label>Como conheceu o HelloPizza:</label>
            <textarea placeholder="Conte a sua historia e diga para a gente como conheceu a melhor pizzaria do brasil" name="adicional" rows="10" cols="20"></textarea>
          </div>
          <div>
            <input type="checkbox" name="utilizou" value="sim" checked>
            <label>Desejo receber ofertas por e-mail</label>
          </div>
        </fieldset>
      </div>
      <input  class=" botao"submit value="Finalizar cadastro" />
    </form>
  </body>

</html>
