<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function verificaNumero(numero){
            if (numero % 2 == 0){
                return "Par"                
            }
            else{
                return "Impar"
            }

        }

        let num = parseInt(prompt('Informe um número'))
        let resultado = verificaNumero(num)
        document.write(' O número é ' + resultado)


    </script>
    
</body>
</html>
