<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for (let i = 1; i<=15; i++){
            let numero = Number(prompt("Digite um número"));
            let raiz = numero ** 0.5;

            document.write("Raiz quadrada: "+ numero + "=" + raiz + "<br>")
        }
    </script>
</body>
</html>
