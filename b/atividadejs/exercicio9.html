<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let pares = 0;
        let impares = 0;
        let maiorque10 = 0;
        for (let i = 1; i<=10; i++){
            let numero = Number(prompt("Digite um número"));

            if(numero % 2 === 0){
                pares++;
            }else{
                impares++;
            }
            if(numero>10){
                maiorque10++;
            }
        }
        document.write("Pares: " + pares  + "<br>");
        document.write("Impares: " + impares + "<br>");
        document.write("Maiores que 10: " + maiorque10)
        </script>
</body>
</html>
