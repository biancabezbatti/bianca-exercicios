<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto</title>
</head>
<body>
    <h1>Classicação</h1>
    <script>
        let codigo = parseInt(prompt('Informe o código do produto'))
        switch(codigo){
            case 1:
                document.write('Alimento não perecível')
                break
            case 2:
                document.write('Alimento perecível')
                break
            case 3:
                document.write('Vestuario')
                break
            case 4:
                document.write('Higiene pessoal')
                break
            case 5:
                document.write('Limpeza e utensílios domésticos')
                break
            case 6:
                document.write('Eletrônicos')
                break
            case 7:
                document.write('Informatica')
                break 
            default:
                document.write('INVALIDO')

        }
    </script>
</body>
</html>
