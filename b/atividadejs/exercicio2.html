<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let nome = prompt('Nome do usuario: ')
        let senha = prompt('Senha: ')
        let idade = prompt('Sua idade: ' )

        if(nome =="admin" && senha =="1234"){
            document.write('Acesso permitido como administrador')
        }else if(nome == "visitante" || idade >=18){
            document.write('Acesso permitido como usuário comum')
        }else{
            document.write('Acesso negado')

        }
            
    </script>
</body>
</html
