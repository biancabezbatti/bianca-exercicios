<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concatenação</title>
</head>
<body>
    <h1>Exemplo com concatenação</h1>
    <script>
        let nome = prompt ('Informe o nome')
        let idade = prompt('Informe a idade')
        document.write('<h1>Olá '+ nome + 
            ' tudo bem ? Estou vendo aqui que você possui '
             + idade + ' anos </h1>')
             
    </script>
</body>
</html>
