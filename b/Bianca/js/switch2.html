<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Exemplo com switch</h1>
    <script>
        let farol = 'amarelo'
        switch(farol){
            case "vermelho":
                alert("Pare")
                break
                case "amarelo":
                    alert("Atenção")
                    break
                    case "verde":
                        alert("Prossiga")
                        break
                        default:
                            alert("Cor ilegal")

        }
    </script>
</body>
</html>
