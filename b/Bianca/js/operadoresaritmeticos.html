<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo com operadores aritméticos</h1>
    <script>
        let num1 = parseInt(prompt('Digite um numero: '))
        let num2 = parseInt(prompt('Digite outro numero: '))
        //soma
        document.write('A soma entre ' + num1 + ' e ' + num2 + ' é ' + (num1 + num2) + '<br>')

        //Subtração
        document.write('A subtração entre ' + num1 + ' e ' + num2 + ' é ' + (num1 - num2) + '<br>')

        //Multiplicação
        document.write('A multiplicação entre ' + num1 + ' e ' + num2 + ' é ' + (num1 * num2) + '<br>')

        //Divisão
        document.write('A divisão entre ' + num1 + ' e ' + num2 + ' é ' + (num1 / num2) + '<br>')

        //Módulo
        document.write('O módulo  entre ' + num1 + ' e ' + num2 + ' é ' + (num1 % num2) + '<br>')

        //Incremento
        document.write('O incremento de ' + num1 + ' e ' + num2 + ' é ' + (num1++) + '<br>')
        document.write(num1 + '<br>')
        //Decremento
        document.write('O Decremento de ' + num1 + ' e ' + num2 + ' é ' + (num1--) + '<br>')
        document.write(num1 + '<br>')

    </script>
</body>
</html>
