<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>switch</title>
</head>
<body>
    <h1> Exemplo com SWITCH</h1>
    <script>
        let diaSemana = parseInt(prompt('Dia semana'))
        switch(diasemana){
            case 1: 
            document.write ('Domingo')
            break
            case 2: 
            document.write ('Segunda - feira')
            break
            case 3: 
            document.write ('Terça - feira')
            break
            case 4: 
            document.write ('Quarta - feira')
            break
            case 5: 
            document.write ('Quinta - feira')
            break
            case 6: 
            document.write ('sexta - feira')
            break
            case 7: 
            document.write ('Sábado')
            break
            
            default: 
            document.write('Dígito inválido')
        }
           
    </script>
</body>
</html>
