<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo com while t</title>
</head>
<body>
    <h1> Exemplo com while</h1>
    <script>
        let contpares = 0
        let contimpares = 0
        let numero = -1
        while (numero !=0){
        let numero = parseInt 
        (prompt('Informe um número (0 - Encerra)'))
        if (numero == 0) {
            break
        }else{
            if(numero % 2 == 0){
                contpares++
            }
            else{
                contimpares++
            }
        }
      
    }
    document.write('Qt números pares' + contpares + '<br>')
    document.write('Qt números impares' + contimpares + '<br>')
    </script>
</body>
</html>
