<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo com for</title>
</head>
<body>
    <h1> Exemplo com estrutura de repetição</h1>
    <h2>Exemplo com estrutura de repetição FOR<h/2>
        <script>
            let numero = parseInt(prompt('Informe um número'))
            for(x=1;x <=10;x++){
                let resultado = numero * x
                document.write(numero + ' x ' + x + '= ' + resultado + '<br>')

            }
        </script>
</body>
</html>
