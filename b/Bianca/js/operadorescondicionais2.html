<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let nome = prompt('Informe o nome ')
        let media =parseFloat(prompt('Informe a média'))
        let frequencia = parseFloat (prompt('Informe a frequencia'))
        if(media >=7 && frequencia >=75){
            document.write('Estudante: ' + nome + '<br>')
            document.write('Média: ' + media + '<br>')
            document.write('Aprovado(a)')

        } else if (media <= 7  || frequencia < 75) {
            document.write('Estudante: ' + nome + '<br>')
            document.write(' Média: ' + media + '<br>')
            document.write('Reprovado(a) por média ou frequencia')

            
        }
    </script>
</body>
</html>
