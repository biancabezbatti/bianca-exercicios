<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo com while</title>
</head>
<body>
    <h1>Exemplo com While</h1>
    <script>
        let numero = parseInt(prompt('Informe um número'))
        let contador = 1
        while (contador <=10){
            let resultado = contador *  numero
            document.write (numero + ' x ' + contador + ' = ' +  resultado + '<br>')
            contador ++
        }
    </script>
</body>
</html>
